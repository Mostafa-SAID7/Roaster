<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1614" rx="20"/>
  
  <!-- Coffee Cup -->
  <g transform="translate(50, 50)">
    <!-- Cup body -->
    <path d="M -20 -15 L -18 20 Q -18 25 -13 25 L 13 25 Q 18 25 18 20 L 20 -15 Z" fill="none" stroke="#d4a373" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Cup handle -->
    <path d="M 20 -5 Q 30 -5 30 5 Q 30 15 20 15" fill="none" stroke="#d4a373" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Coffee inside -->
    <ellipse cx="0" cy="15" rx="16" ry="4" fill="#d4a373" opacity="0.6"/>
    
    <!-- Steam wisps -->
    <path d="M -8 -18 Q -8 -28 -5 -35" fill="none" stroke="#d4a373" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 0 -20 Q 0 -30 3 -37" fill="none" stroke="#d4a373" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 8 -18 Q 8 -28 11 -35" fill="none" stroke="#d4a373" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
